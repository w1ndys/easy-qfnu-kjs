# https://taskfile.dev
version: "3"

silent: true

vars:
  COMPOSE: docker compose
  HOST: '{{default "mylinux" .HOST}}'
  PORT: '{{default "22" .PORT}}'
  USER: '{{default "root" .USER}}'
  DIR: '{{default "/opt/easy-qfnu-kjs" .DIR}}'

tasks:
  default:
    desc: 显示开发与运维命令
    cmds:
      - |
        printf "开发命令:\n"
        printf "  task env-init        初始化本地 .env\n"
        printf "  task install         安装本地依赖\n"
        printf "  task up              启动 Docker 服务\n"
        printf "  task backend-dev     启动后端开发服务\n"
        printf "  task frontend-dev    启动前端开发服务\n"
        printf "\n运维命令:\n"
        printf "  task deploy          一键部署 (默认: HOST=mylinux PORT=22 USER=root DIR=/opt/easy-qfnu-kjs)\n"
        printf "  task deploy HOST=1.2.3.4 PORT=22 USER=root DIR=/srv/app   覆盖默认参数\n"

  env-init:
    desc: 初始化本地环境变量文件
    cmds:
      - |
        if [ -f .env ]; then
          printf ".env already exists\n"
        else
          cp .env.example .env
          printf "created .env from .env.example\n"
        fi

  install:
    desc: 安装本地开发依赖
    cmds:
      - task: install-go
      - task: install-frontend

  install-go:
    desc: 安装 Go 依赖
    cmds:
      - go mod download

  install-frontend:
    desc: 安装前端依赖
    dir: frontend
    cmds:
      - npm install

  build:
    desc: 构建前后端 Docker 镜像
    cmds:
      - '{{.COMPOSE}} build'

  up:
    desc: 构建并启动前后端容器
    cmds:
      - '{{.COMPOSE}} up -d --build'

  down:
    desc: 停止并移除容器
    cmds:
      - '{{.COMPOSE}} down'

  logs:
    desc: 查看容器日志
    cmds:
      - '{{.COMPOSE}} logs --tail=200'

  ps:
    desc: 查看容器状态
    cmds:
      - '{{.COMPOSE}} ps'

  restart:
    desc: 重启容器
    cmds:
      - '{{.COMPOSE}} restart'

  frontend-dev:
    desc: 启动前端本地开发服务器
    dir: frontend
    cmds:
      - npm run dev

  backend-dev:
    desc: 启动后端本地开发服务
    cmds:
      - go run .

  deploy:
    desc: 本地构建镜像并上传到远端服务器部署
    cmds:
      - ./scripts/ops/deploy.sh '{{.HOST}}' '{{.PORT}}' '{{.USER}}' '{{.DIR}}'
